components:
  schemas:
    Attorney:
      properties:
        name:
          type: string
          title: Name
        attorneyId:
          type: integer
          title: Attorneyid
        lawFirmIds:
          items:
            type: integer
          type: array
          uniqueItems: true
          title: Lawfirmids
        clientsPartyIds:
          items:
            type: integer
          type: array
          uniqueItems: true
          title: Clientspartyids
      additionalProperties: false
      type: object
      required:
      - name
      - attorneyId
      - lawFirmIds
      - clientsPartyIds
      title: Attorney
    StateCaseQuery:
      properties:
        courts:
          $ref: '#/components/schemas/StateCourtFilter'
        caseStatus:
          anyOf:
          - $ref: '#/components/schemas/CaseStatus'
          - type: 'null'
        caseTypes:
          anyOf:
          - $ref: '#/components/schemas/CaseTypesFilter'
          - type: 'null'
        caseTags:
          anyOf:
          - $ref: '#/components/schemas/CaseTagsFilter'
          - type: 'null'
        dates:
          anyOf:
          - $ref: '#/components/schemas/CaseDatesFilter'
          - type: 'null'
        judges:
          anyOf:
          - $ref: '#/components/schemas/JudgeFilter'
          - type: 'null'
        events:
          anyOf:
          - $ref: '#/components/schemas/EventFilter'
          - type: 'null'
        lawFirms:
          anyOf:
          - $ref: '#/components/schemas/LawFirmFilter'
          - type: 'null'
        attorneys:
          anyOf:
          - $ref: '#/components/schemas/AttorneyFilter'
          - type: 'null'
        parties:
          anyOf:
          - $ref: '#/components/schemas/PartyFilter'
          - type: 'null'
        resolutions:
          anyOf:
          - $ref: '#/components/schemas/ResolutionsFilter'
          - type: 'null'
        damages:
          anyOf:
          - items:
              $ref: '#/components/schemas/IndividualStateDamagesFilter'
            type: array
          - type: 'null'
          title: Damages
        rulings:
          anyOf:
          - items:
              $ref: '#/components/schemas/IndividualRulingsFilter'
            type: array
          - type: 'null'
          title: Rulings
        ordering:
          $ref: '#/components/schemas/Ordering'
          default: ByFirstFiled
        page:
          type: integer
          title: Page
          default: 1
        pageSize:
