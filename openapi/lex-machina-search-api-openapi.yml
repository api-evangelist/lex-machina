components:
  schemas:
    MagistrateJudgeResult:
      properties:
        name:
          type: string
          title: Name
        magistrateJudgeId:
          type: integer
          title: Magistratejudgeid
        caseCountByCourt:
          items:
            $ref: '#/components/schemas/CaseCountByCourt'
          type: array
          title: Casecountbycourt
        url:
          type: string
          title: Url
      additionalProperties: false
      type: object
      required:
      - name
      - magistrateJudgeId
      - caseCountByCourt
      - url
      title: MagistrateJudgeResult
    BankruptcyJudgeResult:
      properties:
        name:
          type: string
          title: Name
        bankruptcyJudgeId:
          type: integer
          title: Bankruptcyjudgeid
        caseCountByCourt:
          items:
            $ref: '#/components/schemas/CaseCountByCourt'
          type: array
          title: Casecountbycourt
        url:
          type: string
          title: Url
      additionalProperties: false
      type: object
      required:
      - name
      - bankruptcyJudgeId
      - caseCountByCourt
      - url
      title: BankruptcyJudgeResult
    FederalJudgeResult:
      properties:
        name:
          type: string
          title: Name
        federalJudgeId:
          type: integer
          title: Federaljudgeid
        initials:
          type: string
          title: Initials
        caseCountByCourt:
          items:
            $ref: '#/components/schemas/CaseCountByCourt'
          type: array
          title: Casecountbycourt
        url:
          type: string
          title: Url
      additionalProperties: false
      type: object
      required:
      - name
      - federalJudgeId
      - initials
      - caseCountByCourt
      - url
      title: FederalJudgeResult
    CaseCountByCourt:
      properties:
        court:
          type: string
          title: Court
        count:
          type: integer
          title: Count
      additionalProperties: false
      type: object
      required:
      - court
      - count
      title: CaseCountByCourt
    AttorneySearchResults:
      properties:
        totalCount:
          type: integer
          title: Totalcount
        page:
          type: integer
          title: Page
        nextPage:
          anyOf:
          - type: string
          - type: 'null'
          title: Nextpage
        attorneys:
          items:
            $ref: '#/components/schemas/AttorneyResult'
          type: array
          title: Attorneys
      additionalProperties: false
      type: object
      required:
      - totalCount
      - page
      - attorneys
      title: AttorneySearchResults
    AttorneyResult:
      properties:
        name:
          type: string
          title: Name
        attorneyId:
          type: integer
          title: Attorneyid
        url:
          type: string
          title: Url
      additionalProperties: false
      type: object
      required:
      - name
      - attorneyId
      - url
      title: AttorneyResult
    LawFirmSearchResult:
      properties:
        totalCount:
          type: integer
          title: Totalcount
        page:
          type: integer
          title: Page
        nextPage:
          anyOf:
          - type: string
