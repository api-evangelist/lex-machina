      title: PartySearchResults
    StateJudgeResult:
      properties:
        name:
          type: string
          title: Name
        stateJudgeId:
          type: integer
          title: Statejudgeid
        courtPosting:
          type: string
          title: Courtposting
        url:
          type: string
          title: Url
