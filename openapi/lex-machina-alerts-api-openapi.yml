components:
  schemas:
    AlertRunResult:
      properties:
        alertId:
          type: integer
          title: Alertid
        type:
          type: string
          title: Type
        count:
          type: integer
          title: Count
        run:
          type: string
          format: date
          title: Run
        items:
          items:
            $ref: '#/components/schemas/AlertItem'
          type: array
          title: Items
      additionalProperties: false
      type: object
      required:
      - alertId
      - type
      - count
      - run
      - items
      title: AlertRunResult
    Alert:
      properties:
        alertId:
          type: integer
          title: Alertid
        type:
          type: string
          title: Type
        customName:
          anyOf:
          - type: string
          - type: 'null'
          title: Customname
        frequency:
          anyOf:
          - $ref: '#/components/schemas/Frequency'
          - type: 'null'
        lastRun:
          type: string
          format: date
          title: Lastrun
        alertUrl:
          type: string
          title: Alerturl
        lawUrl:
          type: string
          title: Lawurl
      additionalProperties: false
      type: object
      required:
      - alertId
      - type
      - customName
      - frequency
      - lastRun
      - alertUrl
      - lawUrl
      title: Alert
    AlertRunData:
      properties:
        alertId:
          type: integer
          title: Alertid
        type:
          type: string
          title: Type
        runs:
          additionalProperties:
            type: string
          propertyNames:
            format: date
          type: object
          title: Runs
      additionalProperties: false
      type: object
      required:
      - alertId
      - type
      - runs
      title: AlertRunData
    AlertItem:
      properties:
        url:
          anyOf:
          - type: string
          - type: 'null'
          title: Url
        itemId:
          anyOf:
          - type: string
          - type: integer
          - type: 'null'
          title: Itemid
        districtCaseId:
          anyOf:
          - type: integer
          - type: 'null'
          title: Districtcaseid
        appealsCaseId:
          anyOf:
          - type: integer
          - type: 'null'
          title: Appealscaseid
        stateCaseId:
          anyOf:
          - type: integer
          - type: 'null'
          title: Statecaseid
        bankruptcyCaseId:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bankruptcycaseid
        itcInvestigationNumber:
          anyOf:
          - type: string
          - type: 'null'
          title: Itcinvestigationnumber
        ptabTrialId:
          anyOf:
          - type: integer
          - type: 'null'
          title: Ptabtrialid
        districtCaseUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Districtcaseurl
        appealsCaseUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Appealscaseurl
        stateCaseUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Statecaseurl
        bankruptcyCaseUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Bankruptcycaseurl
        itcInvestigationUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Itcinvestigationurl
        ptabTrialUrl:
          anyOf:
          - type: string
          - type: 'null'
          title: Ptabtrialurl
      additionalProperties: false
      type: object
      title: AlertItem
      description: 'A single item resulting from an alert run.


        The various caseId and caseUrl fields will only appear when an

        alert item is a part of metadata about a specific case.


        For example an alert on a district case docket entry will include the

        districtCaseId and districtCaseUrl here.'
    Frequency:
      type: string
      enum:
      - Daily
      - Weekly
      title: Frequency
  securitySchemes:
    JwtAccessBearer:
      type: http
      scheme: bearer
