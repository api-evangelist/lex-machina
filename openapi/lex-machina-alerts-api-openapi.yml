  /alerts/runs/{alert_id}:
    get:
      tags:
      - Alerts
      summary: Get Alert Runs
      description: 'Gets a list of all runs an alert has new data for.


        - **alert_id**: the id of the alert


        Each run represents a new set of relevant items that have been found by the alert on a given day.'
      operationId: get_alert_runs
      security:
      - JwtAccessBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRunData'
              examples:
                Alert Runs:
                  summary: Alert Runs
                  value:
                    alertId: 121766
                    type: New Party PTAB Trials
                    runs:
                      '2024-10-11': https://api.lexmachina.com/alerts/runs/121766/2024-10-11
        '404':
          description: Not found
          content:
            application/json:
              examples:
                Alert not found:
                  summary: Alert not found
                  value:
                    detail: alert_id not found
        '401':
          description: Invalid or expired token
          content:
            application/json:
              examples:
                Expired token:
                  summary: Expired token
                  value:
                    detail: 'Token time expired: Signature has expired.'
                Invalid token:
                  summary: Invalid token
                  value:
                    detail: Invalid token
        '422':
          description: Error - 422
          content:
            application/json:
              examples:
                Validation error:
                  summary: Validation error
                  value:
                    summary: Invalid input
                    detail:
                    - type: parsing
                      loc:
                      - path
                      - query
                      - body
                      msg: invalid input
                      input: '-1'
  /alerts/runs/{alert_id}/{date}:
    get:
      tags:
      - Alerts
      summary: Get Alert Run Results
      description: 'Gets a list of all new items for a given alert run.


        - **alert_id**: the id of the alert

        - **date**: the date of the run


        Data returned for an alert run will vary in format based on context, only the ids and urls for the relevant data will included.'
      operationId: get_alert_run_results
      security:
      - JwtAccessBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      - name: date
        in: path
        required: true
        schema:
          type: string
          format: date
          title: Date
      responses:
        '200':
          description: Success
