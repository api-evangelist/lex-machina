paths:
  /bankruptcy-judges/{bankruptcy_judge_id}:
    get:
      tags:
      - Judges
      summary: Get Bankruptcy Judge
      description: 'Gets data for a single federal bankruptcy judge.


        - **bankruptcy_judge_id**: the Lex Machina bankruptcyJudgeId'
      operationId: get_bankruptcy_judge
      security:
      - JwtAccessBearer: []
      parameters:
      - name: bankruptcy_judge_id
        in: path
        required: true
        schema:
          type: integer
          title: Bankruptcy Judge Id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankruptcyJudgeData'
              examples:
                Single Bankruptcy Judge:
                  summary: Single Bankruptcy Judge
                  value:
                    name: Erik P. Kimball
                    bankruptcyJudgeId: 539
                    initials: EPK
                    caseCountByCourt:
                    - court: total
                      count: 901
        '401':
          description: Invalid or expired token
          content:
            application/json:
              examples:
                Expired token:
                  summary: Expired token
                  value:
                    detail: 'Token time expired: Signature has expired.'
                Invalid token:
                  summary: Invalid token
                  value:
                    detail: Invalid token
        '404':
          description: Not found
          content:
            application/json:
              examples:
                Not found:
                  summary: Not found
                  value:
                    summary: Unknown id
                    detail: Not Found
        '422':
          description: Error - 422
          content:
            application/json:
              examples:
                Validation error:
                  summary: Validation error
                  value:
                    summary: Invalid input
                    detail:
                    - type: parsing
                      loc:
                      - path
                      - query
                      - body
                      msg: invalid input
                      input: '-1'
