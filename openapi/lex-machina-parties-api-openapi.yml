openapi: 3.1.0
info:
  title: Lex Machina Alerts Parties API
  version: '20260324'
  description: Alerts.
servers:
- url: https://api.lexmachina.com
  description: Lex Machina production API
tags:
- name: Parties
  description: Party data.
paths:
  /parties/{party_id}:
    get:
      tags:
      - Parties
      summary: Get Party
      description: 'Gets data for a single party.


        - **party_id**: the Lex Machina partyId'
      operationId: get_party
      security:
      - JwtAccessBearer: []
      parameters:
      - name: party_id
        in: path
        required: true
        schema:
          type: integer
          title: Party Id
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/PartyData'
                - $ref: '#/components/schemas/PartyReference'
                title: Response Get Party Parties  Party Id  Get
              examples:
                Single Party:
                  summary: Single Party
                  value:
                    name: Todd McFarlane
                    partyId: 196852
        '404':
          description: Not found
          content:
            application/json:
              examples:
                Party Not Found:
                  summary: Party Not Found
                  value:
                    detail: No party matching provided party ID was found
        '422':
          description: Error - 422
          content:
            application/json:
              examples:
                Invalid Input:
                  summary: Invalid Input
                  value:
                    detail:
                    - type: int_parsing
                      loc:
                      - path
                      - party_id
                      msg: Input should be a valid integer, unable to parse string as an integer
                      input: string
                Validation error:
                  summary: Validation error
                  value:
                    summary: Invalid input
                    detail:
                    - type: parsing
                      loc:
                      - path
                      - query
                      - body
                      msg: invalid input
                      input: '-1'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              examples:
                Expired token:
                  summary: Expired token
                  value:
                    detail: 'Token time expired: Signature has expired.'
                Invalid token:
                  summary: Invalid token
                  value:
                    detail: Invalid token
  /parties:
    get:
      tags:
      - Parties
      summary: Get Parties
      description: 'Gets data for one or more parties.


        - **partyIds**: the Lex Machina partyIds


        If any of the the partyIds given are not the current lexmachina partyId, the results will include inputId for disambugation'
      operationId: get_parties
      security:
      - JwtAccessBearer: []
      parameters:
      - name: partyIds
        in: query
        required: true
        schema:
          type: array
          uniqueItems: true
          items:
            type: integer
          minItems: 1
          maxItems: 500
          title: Partyids
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  anyOf:
                  - $ref: '#/components/schemas/PartyData'
                  - $ref: '#/components/schemas/PartyReference'
                title: Response Get Parties Parties Get
              examples:
                Multiple Parties:
                  summary: Multiple Parties
                  value:
                  - name: Todd McFarlane
                    partyId: 196852
                  - name: Stan Lee
                    partyId: 56391
        '404':
          description: Not found
          content:
            application/json:
              examples:
                Parties not found:
                  summary: Parties not found
                  value:
                    detail: No parties matching provided party IDs were found
        '401':
          description: Invalid or expired token
          content:
            application/json:
              examples:
                Expired token:
                  summary: Expired token
                  value:
                    detail: 'Token time expired: Signature has expired.'
                Invalid token:
                  summary: Invalid token
                  value:
                    detail: Invalid token
        '422':
          description: Error - 422
          content:
            application/json:
              examples:
                Validation error:
                  summary: Validation error
                  value:
                    summary: Invalid input
                    detail:
                    - type: parsing
                      loc:
                      - path
                      - query
                      - body
                      msg: invalid input
                      input: '-1'
  /search-parties:
    get:
      tags:
      - Parties
      summary: Search Parties
      description: 'Searches for parties.


        - **q**: the query string

        - **page_number**: page number of the results

        - **page_size**:  results per page


        This is a case-insensitive search that will match anywhere within the name of the party.


        The results will have page and totalCount fields as well as a convenience link via the field nextPage.'
      operationId: search_parties
      security:
      - JwtAccessBearer: []
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          title: Q
      - name: pageNumber
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Pagenumber
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          default: 1
          title: Pagesize
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartySearchResults'
              examples:
                Search Parties By Name:
                  summary: Search Parties By Name
                  value:
                    totalCount: 73119
                    page: 1
                    nextPage: https://api.lexmachina.com/search-parties?q=Bryan&pageNumber=1&pageSize=10?q=Bryan&pageNumber=2&pageSize=10
                    parties:
                    - name: William Bryan
                      partyId: 10301
                      url: https://api.lexmachina.com/parties/10301
                    - name: Donna Bryan
                      partyId: 10303
                      url: https://api.lexmachina.com/parties/10303
