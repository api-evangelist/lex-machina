          type: array
          title: Originatingvenues
        court:
          $ref: '#/components/schemas/Court'
      additionalProperties: false
      type: object
      required:
      - originatingVenues
      title: OriginatingVenuesList
    RemediesList:
      properties:
        court:
          $ref: '#/components/schemas/Court'
        remediesByRemedyType:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
          title: Remediesbyremedytype
      additionalProperties: false
      type: object
      required:
      - remediesByRemedyType
      title: RemediesList
