        '422':
          description: Error - 422
          content:
            application/json:
              examples:
                Invalid Input:
                  summary: Invalid Input
                  value:
                    detail:
                    - type: enum
                      loc:
                      - path
                      - court_type
                      msg: Input should be 'FederalDistrict', 'State', 'FederalAppeals', 'FederalBankruptcy', 'PTAB' or 'ITC'
                      input: string
                      ctx:
                        expected: '''FederalDistrict'', ''State'', ''FederalAppeals'', ''FederalBankruptcy'', ''PTAB'' or ''ITC'''
                Unsupported Court Type:
                  summary: Unsupported Court Type
                  value:
                    detail: Case Type not used for ITC
                Validation error:
                  summary: Validation error
                  value:
                    summary: Invalid input
                    detail:
                    - type: parsing
                      loc:
                      - path
                      - query
                      - body
                      msg: invalid input
                      input: '-1'
        '401':
          description: Invalid or expired token
          content:
            application/json:
              examples:
                Expired token:
                  summary: Expired token
                  value:
                    detail: 'Token time expired: Signature has expired.'
                Invalid token:
                  summary: Invalid token
                  value:
                    detail: Invalid token
        '404':
          description: Not found
          content:
            application/json:
              examples:
                Not found:
                  summary: Not found
                  value:
                    summary: Unknown id
                    detail: Not Found
  /list-courts/{court_type}:
    get:
      tags:
      - List
      summary: List Courts
      description: Lists courts for a given court type. For use with querying or determining which courts data is avilable for.
      operationId: list_courts
      security:
