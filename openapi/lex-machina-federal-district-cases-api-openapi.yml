                      summary: This is a patent infringement lawsuit filed by Apple Inc. against Samsung Electronics Co., Ltd., Samsung Electronics America, Inc., and Samsung Telecommunications America, LLC (collectively "Samsung") in April 2011. Apple alleges that Samsung infringed on several Apple patents and trademarks related to the iPhone, iPod Touch, and iPad products through Samsung's Galaxy line of mobile phones and tablets. Specifically, Apple claims Samsung infringed on patents covering aspects of multi-touch interface, scrolling operations, messaging display, and cantilevered push button design. Apple also alleges Samsung infringed its trade dress and trademarks through similarities in product design, user interface, and iconography.Apple claims Samsung's actions have caused irreparable harm to Apple's sales and reputation. Apple seeks injunctive relief, damages, and disgorgement of Samsung's profits from the alleged infringement.
